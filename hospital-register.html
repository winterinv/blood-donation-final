<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Hospital Registration - Blood Buddy</title>
  <link rel="stylesheet" href="theme.css?v=3.1">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(circle at 0% 0%, rgba(255, 71, 87, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(20, 184, 166, 0.05) 0%, transparent 40%);
    }

    .auth-card {
      width: 100%;
      max-width: 500px;
      padding: 3rem 2.5rem;
      text-align: center;
      position: relative;
    }

    .home-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: 0.2s;
    }

    .home-link:hover {
      color: var(--primary);
    }

    .auth-card h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-section-title {
      text-align: left;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border-color);
    }

    .form-section-title:first-of-type {
      margin-top: 0;
    }

    .input-group {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .input-group i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
      z-index: 1;
    }

    .input-group input,
    .input-group select {
      padding-left: 3.2rem;
      width: 100%;
    }

    /* Custom Select Styling */
    select.input-base {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 1em;
      color: var(--text-main);
      cursor: pointer;
    }

    /* File Upload Zone */
    .file-upload-zone {
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-md);
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--bg-secondary);
      margin-bottom: 1.25rem;
    }

    .file-upload-zone:hover,
    .file-upload-zone.dragover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .file-upload-zone.has-file {
      border-color: var(--accent);
      background: rgba(20, 184, 166, 0.05);
    }

    .file-upload-zone .upload-icon {
      font-size: 2rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .file-upload-zone.has-file .upload-icon {
      color: var(--accent);
    }

    .file-upload-zone .upload-text {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .file-upload-zone .upload-text strong {
      color: var(--primary);
    }

    .file-upload-zone .file-name {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
      margin-top: 0.5rem;
      word-break: break-all;
    }

    .file-upload-zone input[type="file"] {
      display: none;
    }

    .submit-btn {
      width: 100%;
      margin-top: 1rem;
    }

    .links-area {
      margin-top: 2rem;
      font-size: 0.95rem;
    }

    .links-area a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .links-area a:hover {
      color: var(--primary-hover);
    }

    /* Status message */
    .status-msg {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .status-msg.pending {
      display: block;
      background: #fef3c7;
      border: 1px solid #f59e0b;
      color: #92400e;
    }

    .status-msg.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
</head>

<body>

  <div class="glass-panel auth-card">
    <a href="index.html" class="home-link"><i class="fas fa-arrow-left"></i> Home</a>

    <div style="margin-bottom: 1.5rem;">
      <i class="fas fa-hospital" style="font-size: 2.5rem; color: var(--primary);"></i>
    </div>
    <h2>Register Hospital</h2>
    <p class="subtitle">Join the Blood Buddy Coordination Network</p>

    <form id="hospitalForm">

      <div class="form-section-title">Account Credentials</div>

      <div class="input-group">
        <i class="fas fa-envelope icon"></i>
        <input id="email" type="email" class="input-base" placeholder="Hospital Email" required />
      </div>

      <div class="input-group">
        <i class="fas fa-lock icon"></i>
        <input id="password" type="password" class="input-base" placeholder="Password (min 6 characters)" minlength="6" required />
      </div>

      <div class="form-section-title">Hospital Information</div>

      <div class="input-group">
        <i class="fas fa-h-square icon"></i>
        <input id="name" class="input-base" placeholder="Hospital Name" required />
      </div>

      <div class="input-group">
        <i class="fas fa-map-marker-alt icon"></i>
        <input id="address" class="input-base" placeholder="Full Address" required />
      </div>

      <div class="input-group">
        <i class="fas fa-city icon"></i>
        <input id="city" class="input-base" placeholder="City" required />
      </div>

      <div class="input-group">
        <i class="fas fa-phone icon"></i>
        <input id="contact" type="tel" class="input-base" placeholder="Contact Number" required />
      </div>

      <div class="input-group">
        <i class="fas fa-building icon"></i>
        <select id="type" class="input-base">
          <option value="Private">Private</option>
          <option value="Government">Government</option>
          <option value="NGO">NGO</option>
        </select>
      </div>

      <div class="form-section-title">License Verification</div>

      <div class="input-group">
        <i class="fas fa-id-card icon"></i>
        <input id="licenseNumber" class="input-base" placeholder="License Number (Drugs & Cosmetics Act)" required />
      </div>

      <div class="file-upload-zone" id="uploadZone">
        <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
        <div class="upload-text">
          <strong>Click to upload</strong> or drag & drop<br>
          <small>License Document (PDF only, max 5MB)</small>
        </div>
        <div class="file-name" id="fileName"></div>
        <input type="file" id="licenseFile" accept=".pdf,application/pdf" required />
      </div>

      <button type="submit" class="btn btn-primary submit-btn" id="submitBtn">Submit Registration</button>
    </form>

    <div class="status-msg" id="statusMsg"></div>

    <div class="links-area">
      <p>Already registered? <a href="hospital-login.html">Login here</a></p>
    </div>
  </div>

  <script type="module" src="hospital-register.js?v=1.1"></script>

  <script>
    if(localStorage.getItem('bb_dark_mode') === 'true') document.body.classList.add('dark-mode');
  </script>
</body>

</html>
